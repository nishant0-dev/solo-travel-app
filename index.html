<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: white;
}

/* LOGIN */
#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#loginPage input {
  padding:12px;
  border-radius:10px;
  border:none;
  margin:10px;
}

/* APP */
#app { display:none; }

.header {
  text-align:center;
  padding:15px;
  font-size:20px;
}

.search input {
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  background:#3b82f6;
  color:white;
  border:none;
  padding:8px;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

/* MAP */
#map {
  height:250px;
  margin:10px;
  border-radius:12px;
}

/* GRID */
#places {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.03);
}

.card img {
  width:100%;
  height:100px;
  object-fit:cover;
  border-radius:10px;
}

/* NAV */
.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login 🌍</h2>
  <input id="username" placeholder="Enter name">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">Wanderer Pro</div>

<div class="search">
  <input placeholder="Search..."
  onkeypress="if(event.key==='Enter') searchGlobal(this.value)">
</div>

<div style="text-align:center">
  <button onclick="getLocation()">📍 Location</button>
</div>

<div id="map"></div>

<div id="explore">
  <h3 style="padding-left:10px;">Nearby</h3>
  <div id="places"></div>
</div>

<div id="bucketScreen" class="hidden">
  <h3>Bucket</h3>
  <div id="bucket"></div>
</div>

<div id="taskScreen" class="hidden">
  <h3>Tasks</h3>
  <div id="tasks"></div>
  ⭐ <span id="points">0</span>
</div>

<div class="nav">
  <button onclick="showTab('explore')">Explore</button>
  <button onclick="showTab('bucketScreen')">Bucket</button>
  <button onclick="showTab('taskScreen')">Tasks</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let userLat = 28.6139;
let userLon = 77.2090;

let bucket = JSON.parse(localStorage.getItem("bucket")) || [];
let points = parseInt(localStorage.getItem("points")) || 0;

/* LOGIN */
function login(){
  const user = document.getElementById("username").value;
  if(!user) return alert("Enter name");

  localStorage.setItem("user", user);
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initApp();
}

/* AUTO LOGIN */
window.onload = ()=>{
  if(localStorage.getItem("user")){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    initApp();
  }
};

function initApp(){
  updatePoints();
  renderBucket();
  renderTasks();

  initMap(userLat,userLon);

  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    initMap(userLat,userLon);
    fetchPlaces(userLat,userLon);
  },()=>{
    fetchPlaces(userLat,userLon);
  });
}

/* MAP */
function initMap(lat,lon){
  if(map) map.remove();

  map = L.map('map').setView([lat,lon],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([lat,lon]).addTo(map).bindPopup("You").openPopup();
}

/* SEARCH */
async function searchGlobal(q){
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  const data = await res.json();

  if(!data.length) return alert("Not found");

  userLat = data[0].lat;
  userLon = data[0].lon;

  initMap(userLat,userLon);
  fetchPlaces(userLat,userLon);
}

/* DISTANCE */
function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.sin(dLon/2)**2;

  return (R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))).toFixed(2);
}

/* FETCH */
async function fetchPlaces(lat,lon){
  document.getElementById("places").innerHTML="Loading...";

  try{
    const query=`[out:json];node["amenity"](around:2000,${lat},${lon});out;`;

    const res=await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query));
    const data=await res.json();

    if(!data.elements.length){
      document.getElementById("places").innerHTML="No places";
      return;
    }

    let html="";

    data.elements.slice(0,8).forEach(p=>{
      const name=p.tags?.name||"Place";
      const dist=getDistance(userLat,userLon,p.lat,p.lon);

      html+=`
      <div class="card">
        <img src="https://source.unsplash.com/400x200/?${name}">
        <b>${name}</b>
        <small>${dist} km</small><br>
        <button onclick="focusMap(${p.lat},${p.lon})">View</button>
        <button onclick="addBucket('${name}')">Save</button>
      </div>`;
    });

    document.getElementById("places").innerHTML=html;

  }catch{
    document.getElementById("places").innerHTML="Error loading";
  }
}

/* MAP FOCUS */
function focusMap(lat,lon){
  map.setView([lat,lon],15);
}

/* BUCKET */
function addBucket(n){
  if(!bucket.includes(n)){
    bucket.push(n);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  let html="";
  bucket.forEach((b,i)=>{
    html+=`<div class="card">${b}
    <button onclick="removeBucket(${i})">❌</button></div>`;
  });
  document.getElementById("bucket").innerHTML=html;
}

function removeBucket(i){
  bucket.splice(i,1);
  localStorage.setItem("bucket",JSON.stringify(bucket));
  renderBucket();
}

/* TASK */
function renderTasks(){
  document.getElementById("tasks").innerHTML=
  `<div class="card">Explore<button onclick="completeTask()">Done</button></div>`;
}

function completeTask(){
  points+=10;
  localStorage.setItem("points",points);
  updatePoints();
}

function updatePoints(){
  document.getElementById("points").innerText=points;
}

/* TAB */
function showTab(t){
  document.getElementById("explore").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}
</script>

</body>
</html>
