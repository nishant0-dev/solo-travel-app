<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1220;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:#0f172a;
}

/* SEARCH */
input{
  width:92%;
  margin:10px auto;
  display:block;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#1e293b;
  color:white;
}

/* BUTTON */
button{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* MAP */
#map{
  height:60vh;
  transition:height 0.3s ease;
}

/* SHEET */
#sheet{
  position:fixed;
  bottom:0;
  width:100%;
  height:45vh;
  background:rgba(15,23,42,0.95);
  backdrop-filter:blur(20px);
  border-radius:25px 25px 0 0;
  padding:15px;
  overflow-y:auto;
  box-shadow:0 -10px 40px rgba(0,0,0,0.6);
}

/* HANDLE */
#handle{
  width:60px;
  height:6px;
  background:#475569;
  margin:8px auto;
  border-radius:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:#1e293b;
  border-radius:16px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:130px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.actions{
  display:flex;
  justify-content:space-between;
}

/* LOGIN FIX */
#loginPage video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  pointer-events:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-ganges-river-in-india-1574/1080p.mp4">
</video>

<div class="login-box">
<h2>Wanderer Pro 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div class="header">Wanderer Pro</div>

<input placeholder="Search..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<div id="sheet">
<div id="handle"></div>
<div id="places"></div>
</div>
</div>

<!-- LEAFLET -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- MAIN JS -->
<script>
const API_KEY="11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;

function initMap(){
  if(map) map.remove();

  map=L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  fetchPlaces();
}

async function fetchPlaces(){
  const el=document.getElementById("places");
  el.innerHTML="Loading...";

  try{
    const url=`https://api.geoapify.com/v2/places?categories=tourism.sights,catering.restaurant,catering.cafe&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`;

    const res=await fetch(url);
    const data=await res.json();

    let html="<div class='grid'>";

    data.features.forEach(p=>{
      const name=p.properties.name||"Place";
      const lat=p.properties.lat;
      const lon=p.properties.lon;

      html+=`
      <div class="card">
        <img src="https://source.unsplash.com/400x300/?travel">
        <div class="card-content">
          ${name}
          <div class="actions">
            <button onclick="direction(${lat},${lon})">🧭</button>
            <button onclick="visit('${name}')">⭐</button>
          </div>
        </div>
      </div>`;
    });

    html+="</div>";
    el.innerHTML=html;

  }catch{
    el.innerHTML="Error loading";
  }
}

async function searchPlace(q){
  const res=await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
  const data=await res.json();

  userLat=data.features[0].properties.lat;
  userLon=data.features[0].properties.lon;

  initMap();
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    initMap();
  });
}

function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function visit(name){
  alert("Visited "+name);
}
</script>

<!-- FIREBASE (UNCHANGED) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlu9Xw8_Nb9sN-TCyMsjORViHQD9MQnRg",
  authDomain: "wanderer-6b780.firebaseapp.com",
  projectId: "wanderer-6b780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function(){
  try{
    await signInWithPopup(auth, provider);
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    initMap();
  }catch(e){
    alert("Login failed: "+e.message);
  }
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    initMap();
  }
});

window.logout=function(){
  signOut(auth).then(()=>location.reload());
};
</script>

</body>
</html>
