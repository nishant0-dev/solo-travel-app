<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer App</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(to bottom,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

.container{ margin-top:40px; }

.card{
  background:rgba(255,255,255,0.1);
  padding:20px;
  margin:15px auto;
  border-radius:15px;
  width:92%;
  max-width:480px;
  backdrop-filter:blur(12px);
}

button{
  padding:10px 14px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:linear-gradient(to right,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  width:85%;
  margin:10px;
  font-size:15px;
}

.place{
  background:rgba(255,255,255,0.1);
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  width:92%;
  max-width:480px;
  text-align:left;
}

#map{
  height:300px;
  width:92%;
  max-width:480px;
  margin:15px auto;
  border-radius:12px;
}

.badge{
  background:#1abc9c;
  padding:3px 8px;
  border-radius:8px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌍 Wanderer</h1>
  <p id="points">⭐ Points: 0</p>

  <div class="card">
    <h3>📍 Your Location</h3>
    <p id="location">Click below</p>
    <button onclick="getLocation()">Get Location</button>
  </div>

  <!-- 🔥 GLOBAL SEARCH -->
  <input type="text" placeholder="Search any place in world..."
  onkeypress="if(event.key==='Enter') searchGlobal(this.value)">

  <div id="map"></div>

  <h3>📍 Nearby Places</h3>
  <div id="places"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;

function initMap(lat,lon){
  if(map) map.remove();

  map=L.map('map').setView([lat,lon],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

  L.marker([lat,lon]).addTo(map).bindPopup("You").openPopup();
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    document.getElementById("location").innerText =
      lat.toFixed(4)+", "+lon.toFixed(4);

    initMap(lat,lon);
    fetchPlaces(lat,lon);
  });
}

async function fetchPlaces(lat,lon){
  const query=`
  [out:json];
  (
    node["tourism"](around:3000, ${lat}, ${lon});
    node["amenity"](around:3000, ${lat}, ${lon});
    node["leisure"](around:3000, ${lat}, ${lon});
  );
  out;`;

  const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

  const res=await fetch(url);
  const data=await res.json();

  let html="<h3>Nearby</h3>";

  data.elements.slice(0,10).forEach(p=>{
    const name=p.tags?.name || "Unknown Place";
    html+=`<div class="place">${name}</div>`;
  });

  document.getElementById("places").innerHTML=html;
}

<!-- 🔥 GLOBAL SEARCH FUNCTION -->
async function searchGlobal(query){
  if(!query) return;

  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

  const res = await fetch(url);
  const data = await res.json();

  if(!data.length){
    alert("Place not found ❌");
    return;
  }

  const place = data[0];
  const lat = parseFloat(place.lat);
  const lon = parseFloat(place.lon);

  document.getElementById("location").innerText =
    place.display_name;

  initMap(lat,lon);

  L.marker([lat, lon]).addTo(map)
    .bindPopup(place.display_name)
    .openPopup();

  fetchPlaces(lat, lon);
}
</script>

</body>
</html>
