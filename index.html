<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  overflow:hidden;
}

/* LOGIN */
#loginPage{
  position:relative;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

#loginPage video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

.login-box{
  background:rgba(0,0,0,0.6);
  padding:45px;
  border-radius:20px;
  text-align:center;
  backdrop-filter:blur(10px);
}

.login-box h2{
  font-size:32px;
}

.login-box button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:12px;
  background:#3b82f6;
  color:white;
}

/* APP */
#app{
  display:none;
  background:#0f172a;
  height:100vh;
}

/* HEADER */
.header{
  text-align:center;
  padding:10px;
  font-size:18px;
}

/* SEARCH */
input{
  padding:12px;
  border-radius:12px;
  border:none;
  margin:10px;
  width:90%;
  background:#1e293b;
  color:white;
}

/* MAP */
#map{
  height:60vh;
}

/* 🔥 DRAG SHEET */
#sheet{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:40vh;
  background:#020617;
  border-radius:20px 20px 0 0;
  padding:10px;
  overflow:auto;
  transition:0.3s;
}

/* HANDLE */
#handle{
  width:50px;
  height:5px;
  background:gray;
  margin:5px auto;
  border-radius:10px;
}

/* CARD */
.card{
  background:#1e293b;
  margin:10px 0;
  border-radius:12px;
  display:flex;
}

.card img{
  width:120px;
  height:100px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-ganges-river-in-india-1574/1080p.mp4">
</video>

<div class="login-box">
<h2>Wanderer Pro 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="header">Wanderer Pro</div>

<input placeholder="Search..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<!-- DRAG SHEET -->
<div id="sheet">
<div id="handle"></div>
<div id="places"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_KEY="11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;

/* MAP */
function initMap(){
  if(map) map.remove();

  map=L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  fetchPlaces();
}

/* API */
async function fetchPlaces(){
  const el=document.getElementById("places");
  el.innerHTML="Loading...";

  try{
    const url=`https://api.geoapify.com/v2/places?categories=tourism.sights,catering.restaurant,catering.cafe&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`;

    const res=await fetch(url);
    const data=await res.json();

    let html="";
    data.features.forEach(p=>{
      const name=p.properties.name||"Place";
      const lat=p.properties.lat;
      const lon=p.properties.lon;

      html+=`
      <div class="card">
        <img src="https://picsum.photos/200?random=${Math.random()}">
        <div class="card-content">
          <b>${name}</b><br>
          <button onclick="direction(${lat},${lon})">Direction</button>
        </div>
      </div>`;
    });

    el.innerHTML=html;

  }catch{
    el.innerHTML="Error loading";
  }
}

/* SEARCH */
async function searchPlace(q){
  const res=await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
  const data=await res.json();

  userLat=data.features[0].properties.lat;
  userLon=data.features[0].properties.lon;

  initMap();
}

/* LOCATION */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    initMap();
  });
}

/* DIRECTION */
function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

/* 🔥 DRAG SYSTEM */
const sheet=document.getElementById("sheet");
let startY=0;
let currentY=0;
let isDragging=false;

sheet.addEventListener("mousedown",startDrag);
sheet.addEventListener("touchstart",startDrag);

function startDrag(e){
  isDragging=true;
  startY=e.touches?e.touches[0].clientY:e.clientY;
}

document.addEventListener("mousemove",drag);
document.addEventListener("touchmove",drag);

function drag(e){
  if(!isDragging) return;
  currentY=e.touches?e.touches[0].clientY:e.clientY;
  let diff=startY-currentY;

  if(diff>50){
    sheet.style.height="80vh";
  }else if(diff<-50){
    sheet.style.height="40vh";
  }
}

document.addEventListener("mouseup",()=>isDragging=false);
document.addEventListener("touchend",()=>isDragging=false);

/* LOGIN SAME */
function googleLogin(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initMap();
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
