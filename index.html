<!DOCTYPE html>
<!-- redeploy -->
<html>
<head>
 <link rel="manifest" href="./manifest.json">
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<meta name="theme-color" content="#0f172a">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg:#0b1220;
  --card:#111827;
  --glass:rgba(255,255,255,0.06);
  --accent:#3b82f6;
  --accent2:#22c55e;
  --text:#e2e8f0;
}

body{
  margin:0;
  font-family:'Inter',system-ui;
  background:linear-gradient(180deg,#020617,#0b1220);
  color:var(--text);
  overflow:hidden;
}

*{
  transition:all 0.25s cubic-bezier(.4,0,.2,1);
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:14px;
  font-size:20px;
  font-weight:600;
  backdrop-filter:blur(16px);
  background:var(--glass);
  position:sticky;
  top:0;
  z-index:1000;
}

/* SEARCH */
input{
  width:90%;
  margin:12px auto;
  padding:14px;
  border-radius:16px;
  border:none;
  background:var(--card);
  color:white;
  box-shadow:
    inset 2px 2px 6px rgba(0,0,0,0.6),
    inset -2px -2px 6px rgba(255,255,255,0.05);
}

/* MAP */
#map{
  height:38vh;
  border-radius:20px;
  margin:0 10px;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
}

/* SHEET */
#sheet{
  position:fixed;
  bottom:0;
  width:100%;
  height:55vh;
  background:linear-gradient(180deg,#020617,#020617dd);
  border-radius:30px 30px 0 0;
  overflow:auto;
  padding:16px;
  backdrop-filter:blur(20px);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

/* CARD */
.card{
  background:var(--card);
  border-radius:20px;
  overflow:hidden;
  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

/* BUTTON */
button{
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;
  color:white;
  border-radius:10px;
  padding:6px 10px;
}

/* SKELETON */
.skeleton{
  height:180px;
  border-radius:16px;
  background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);
  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  0%{background-position:-200%}
  100%{background-position:200%}
}

/* INSTALL BUTTON */
#installBtn{
  position:fixed;
  bottom:80px;
  right:15px;
  padding:12px 16px;
  border-radius:20px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  display:none;
}
    /* LOGIN BOX */
.login-box{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  background:rgba(0,0,0,0.4);
  padding:25px;
  border-radius:20px;
  backdrop-filter:blur(10px);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
  align-items:center;
}

.header-right{
  display:flex;
  gap:10px;
  align-items:center;
}

/* SEARCH + LOCATION */
.top-controls{
  display:flex;
  gap:8px;
  width:92%;
  margin:10px auto;
}

.top-controls input{
  flex:1;
}

.loc-btn{
  padding:10px;
  border-radius:12px;
}

/* MAP IMPROVE */
#map{
  position:relative;
}

/* NAV ICONS */
.nav button{
  font-size:18px;
}

/* INSTALL BTN */
#installBtn{
  position:fixed;
  bottom:90px;
  right:15px;
  z-index:1000;
  padding:12px;
  border-radius:20px;
}

/* MENU DEPTH */
#menu{
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}

/* PROFILE IMAGE */
.profile-top img{
  border:3px solid #3b82f6;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="loginSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
<audio id="saveSound" src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3"></audio>
<audio id="rewardSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

<!-- FLOATING INSTALL BUTTON -->
<button id="installBtn">📲 Install</button>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="login-box">
    <h2>🌍 Wanderer Pro</h2>
    <button onclick="googleLogin()">Login with Google</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <!-- PREMIUM HEADER -->
  <div class="header">
    <div class="title">Wanderer</div>
    <div class="header-right">
      <span id="userPoints">⭐ 0</span>
      <div id="profileBtn" onclick="toggleMenu()">☰</div>
    </div>
  </div>

  <!-- OVERLAY -->
  <div id="overlay" onclick="toggleMenu()"></div>

  <!-- SIDE MENU -->
  <div id="menu">
    <div class="profile-top">
      <img id="userPhoto" src="https://via.placeholder.com/80" />
      <h3 id="menuUser">User</h3>
      <p id="menuEmail">email@gmail.com</p>
    </div>

    <div class="menu-items">
      <button onclick="showTab('explore')">🏠 Explore</button>
      <button onclick="showTab('saved')">❤️ Saved</button>
      <button>⚙️ Settings</button>
      <button>ℹ️ About</button>
      <button onclick="logout()">🚪 Logout</button>
    </div>
  </div>

  <!-- SEARCH + LOCATION -->
  <div class="top-controls">
    <input id="searchInput" placeholder="Search places..." oninput="suggestPlaces(this.value)">
    <button class="loc-btn" onclick="getLocation()">📍</button>
  </div>

  <!-- SUGGESTIONS -->
  <div id="suggestions"></div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- BOTTOM SHEET -->
  <div id="sheet">
    <div id="handle"></div>
    <div id="places"></div>
  </div>

  <!-- SAVED TAB -->
  <div id="saved" style="display:none"></div>

  <!-- NAVBAR -->
  <div class="nav">
    <button onclick="showTab('explore')">🏠</button>
    <button onclick="showTab('saved')">❤️</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>


<script>
const API_KEY="11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;
let points=parseInt(localStorage.getItem("points"))||0;

function initMap(){
  if(map) map.remove();
  map=L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  fetchPlaces();
}

/* BASIC LOAD */
document.addEventListener("DOMContentLoaded", () => {
  const vid = document.getElementById("bgVideo");
  if (vid) {
    vid.muted = true;
    vid.play().catch(()=>{});
  }
});

/* FETCH */
async function fetchPlaces(){
  document.getElementById("places").innerHTML = `
    <div class="grid">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>
  `;

  const res=await fetch(`https://api.geoapify.com/v2/places?categories=tourism.sights,catering.restaurant&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`);
  const data=await res.json();

  let html="<div class='grid'>";

  data.features.forEach(p=>{
    const name=p.properties.name||"Place";
    const lat=p.properties.lat;
    const lon=p.properties.lon;

    html+=`
    <div class="card">
     <img src="https://picsum.photos/400/300?random=${Math.random()}">
      <div class="card-content">
        ${name}
        <div>
          <button onclick="direction(${lat},${lon})">🧭</button>
          <button onclick="savePlace('${name}')">❤️</button>
        </div>
      </div>
    </div>`;
  });

  html+="</div>";
  document.getElementById("places").innerHTML=html;
}

function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function savePlace(name){
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  if(!saved.includes(name)){
    saved.push(name);
    localStorage.setItem("saved", JSON.stringify(saved));
  }
}

function showTab(tab){
  if(tab==="explore"){
    document.getElementById("sheet").style.display="block";
    document.getElementById("saved").style.display="none";
  }else{
    document.getElementById("sheet").style.display="none";
    document.getElementById("saved").style.display="block";
  }
}

function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}
  // ✅ ADD MISSING FUNCTIONS

async function suggestPlaces(q){
  if(q.length<2) return;

  try{
    const res = await fetch(`https://api.geoapify.com/v1/geocode/autocomplete?text=${q}&apiKey=${API_KEY}`);
    const data = await res.json();

    let html="";
    data.features.forEach(p=>{
      html += `<div onclick="selectPlace(${p.properties.lat},${p.properties.lon})">
        ${p.properties.formatted}
      </div>`;
    });

    document.getElementById("suggestions").innerHTML = html;
  }catch(e){}
}

function selectPlace(lat,lon){
  userLat = lat;
  userLon = lon;
  document.getElementById("suggestions").innerHTML = "";
  initMap();
}

function playSound(id){
  const sound = document.getElementById(id);
  if(!sound) return;
  sound.currentTime = 0;
  sound.play().catch(()=>{});
}
  let deferredPrompt;

document.addEventListener("DOMContentLoaded", () => {

  const installBtn = document.getElementById("installBtn");

  window.addEventListener("beforeinstallprompt", (e) => {
    e.preventDefault();
    deferredPrompt = e;

    installBtn.style.display = "block";
  });

  installBtn.addEventListener("click", async () => {
    if (!deferredPrompt) return;

    deferredPrompt.prompt();

    const { outcome } = await deferredPrompt.userChoice;
    console.log("Install result:", outcome);

    deferredPrompt = null;
    installBtn.style.display = "none";
  });
});
</script>


<!-- FIREBASE -->
<script type="module">
import { 
  initializeApp, 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { 
  getAuth, 
  GoogleAuthProvider, 
  signInWithPopup, 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyDlu9Xw8_Nb9sN-TCyMsjORViHQD9MQnRg",
  authDomain: "wanderer-6b780.firebaseapp.com",
  projectId: "wanderer-6b780"
});

const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async ()=>{
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    initMap();
  }
});
window.logout = function(){
  signOut(auth).then(()=>location.reload());
};
</script>

 <script>


function getLocation(){
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition((pos)=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    if (typeof initMap === "function") {
      initMap();
    }
  }, (err)=>{
    alert("Location permission denied");
  });
}
</script>

</body>
</html>
