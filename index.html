<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif}
#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column}
#app{display:none}
input{padding:10px;border-radius:10px;border:none;margin:10px;width:90%}
button{padding:8px;border:none;border-radius:10px;background:#3b82f6;color:white;margin:5px}
#map{height:250px;margin:10px;border-radius:10px}
#places{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:#1e293b;padding:10px;border-radius:10px}
img{width:100%;height:100px;object-fit:cover;border-radius:10px}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#020617;padding:10px}
.hidden{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<h2>Login 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app">

<h2 style="text-align:center">Wanderer Pro</h2>

<input placeholder="Search place..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍 Location</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<h3 style="padding-left:10px;">Nearby</h3>
<div id="places"></div>

<div id="bucketScreen" class="hidden">
<h3>Bucket</h3>
<div id="bucket"></div>
</div>

<div class="nav">
<button onclick="showTab('places')">Explore</button>
<button onclick="showTab('bucketScreen')">Bucket</button>
</div>

</div>

<!-- GOOGLE MAP -->
<script>
const GOOGLE_API_KEY = "AIzaSyAUEk_qiRoRyjaW0Vgrlejx_61f8E8AtLQ";

let map, service;
let userLat=28.61,userLon=77.20;
let bucket = JSON.parse(localStorage.getItem("bucket"))||[];
let points = parseInt(localStorage.getItem("points"))||0;

function initMap(){
  map = new google.maps.Map(document.getElementById("map"),{
    center:{lat:userLat,lng:userLon},
    zoom:14
  });

  service = new google.maps.places.PlacesService(map);

  loadPlaces();
}

function loadPlaces(){
  const request = {
    location: new google.maps.LatLng(userLat,userLon),
    radius:2000,
    type:['tourist_attraction','restaurant','cafe','park']
  };

  service.nearbySearch(request,(results,status)=>{
    if(status !== google.maps.places.PlacesServiceStatus.OK){
      document.getElementById("places").innerHTML="No places";
      return;
    }

    let html="";
    results.slice(0,8).forEach(p=>{
      const img = p.photos ? p.photos[0].getUrl() : "";
      const rating = p.rating || "N/A";

      html += `
      <div class="card">
        <img src="${img}">
        <b>${p.name}</b><br>
        ⭐ ${rating}<br>
        <button onclick="direction(${p.geometry.location.lat()},${p.geometry.location.lng()})">Direction</button>
        <button onclick="addBucket('${p.name}')">Save</button>
        <button onclick="visit('${p.name}')">Visit</button>
      </div>`;
    });

    document.getElementById("places").innerHTML = html;
  });
}

function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    initMap();
  });
}

function searchPlace(q){
  const geocoder = new google.maps.Geocoder();
  geocoder.geocode({address:q},(res)=>{
    userLat = res[0].geometry.location.lat();
    userLon = res[0].geometry.location.lng();
    initMap();
  });
}

/* BUCKET */
function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  let html="";
  bucket.forEach(b=>{
    html += `<div class="card">${b}</div>`;
  });
  document.getElementById("bucket").innerHTML=html;
}

/* VISIT REWARD */
function visit(name){
  points+=10;
  localStorage.setItem("points",points);
  alert("🎉 +10 points for visiting "+name);
}

/* TAB */
function showTab(tab){
  document.getElementById("places").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

/* LOGIN (SIMPLE) */
function googleLogin(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initMap();
}

function logout(){
  location.reload();
}
</script>

<!-- GOOGLE SCRIPT -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAUEk_qiRoRyjaW0Vgrlejx_61f8E8AtLQ&libraries=places&callback=initMap" async defer></script>

</body>
</html>
