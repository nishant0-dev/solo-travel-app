<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solo Travel App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 80px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      width: 80%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00aaff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🌍 Solo Travel App</h1>
    <p>Find nearby places & explore</p>

    <div class="card">
      <h2>📍 Nearby Place</h2>
      <p id="location">Click button to get location</p>
      <button onclick="getLocation()">Get My Location</button>
    </div>

    <!-- ✅ IMPORTANT: this should be OUTSIDE script -->
    <div id="places"></div>

  </div>

<script>
async function getLocation() {
  const el = document.getElementById("location");
  el.innerText = "Requesting permission...";

  if (!navigator.geolocation) {
    el.innerText = "Geolocation not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      el.innerText = "📍 " + lat.toFixed(4) + ", " + lon.toFixed(4);
      fetchNearbyPlaces(lat, lon);
    },
    () => {
      el.innerText = "❌ Permission denied";
    }
  );
}

async function fetchNearbyPlaces(lat, lon) {
  const query = `
  [out:json];
  (
    node["tourism"](around:2000, ${lat}, ${lon});
    node["amenity"="restaurant"](around:2000, ${lat}, ${lon});
    node["amenity"="cafe"](around:2000, ${lat}, ${lon});
    node["leisure"="park"](around:2000, ${lat}, ${lon});
  );
  out;
  `;

  const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

  const box = document.getElementById("places");
  box.innerHTML = "Loading nearby places...";

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (!data.elements.length) {
      box.innerHTML = "No places found";
      return;
    }

    let html = "<h3>🌍 Nearby Places</h3>";

    data.elements.slice(0, 10).forEach(place => {
      const name = place.tags.name || "Unknown Place";
      const dist = getDistance(lat, lon, place.lat, place.lon);

      html += `
        <div style="background:rgba(255,255,255,0.1);padding:10px;margin:10px;border-radius:8px;">
          <b>${name}</b><br/>
          📍 ${dist.toFixed(2)} km away
        </div>
      `;
    });

    box.innerHTML = html;

  } catch (e) {
    box.innerHTML = "Error loading places";
  }
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}
</script>

</body>
</html>
