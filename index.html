<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solo Travel Pro+</title>

<!-- Leaflet Map CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}
.container{ margin-top:40px; }

.card{
  background: rgba(255,255,255,0.1);
  padding:20px;
  margin:15px auto;
  border-radius:15px;
  width:92%;
  max-width:480px;
  backdrop-filter: blur(12px);
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

button{
  padding:10px 14px;
  margin:6px;
  border:none;
  border-radius:10px;
  background: linear-gradient(to right,#00c6ff,#0072ff);
  color:white;
  cursor:pointer;
  transition:0.2s;
}
button:hover{ transform:scale(1.05); }

input{
  padding:10px;
  border-radius:10px;
  border:none;
  width:85%;
  margin:10px;
}

.place{
  background: rgba(255,255,255,0.1);
  margin:10px auto;
  padding:14px;
  border-radius:12px;
  width:92%;
  max-width:480px;
  text-align:left;
  transition:0.2s;
}
.place:hover{ transform:translateY(-3px); }

#map{
  height:300px;
  width:92%;
  max-width:480px;
  margin:15px auto;
  border-radius:12px;
}

.badge{
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  background:#1abc9c;
  margin-left:6px;
}

/* simple confetti */
.confetti{
  position:fixed;
  width:8px;height:8px;
  top:-10px;
  animation:fall 2s linear forwards;
}
@keyframes fall{
  to{ transform:translateY(100vh) rotate(360deg); opacity:0;}
}
</style>
</head>

<body>

<div class="container">
  <h1>🌍 Wanderer </h1>
  <p id="points">⭐ Points: 0</p>

  <div class="card">
    <h3>📍 Your Location</h3>
    <p id="location">Click below</p>
    <button onclick="getLocation()">Get Location</button>
  </div>

  <input type="text" placeholder="Search places..." oninput="searchPlaces(this.value)">

  <div>
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('restaurant')">Food</button>
    <button onclick="setFilter('temple')">Temple</button>
    <button onclick="setFilter('park')">Nature</button>
  </div>

  <div id="map"></div>

  <h3>📍 Nearby Places</h3>
  <div id="places"></div>

  <h3>🎯 Bucket List</h3>
  <div id="bucket"></div>

  <h3>🏆 Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let allPlaces=[];
let filterType="all";

let visited=JSON.parse(localStorage.getItem("visited"))||[];
let bucket=JSON.parse(localStorage.getItem("bucket"))||[];

updatePoints();
renderBucket();
renderLeaderboard();

let map, marker;

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    document.getElementById("location").innerText =
      lat.toFixed(4)+", "+lon.toFixed(4);

    initMap(lat,lon);
    fetchPlaces(lat,lon);
  });
}

function initMap(lat,lon){
  if(map){ map.remove(); }
  map=L.map('map').setView([lat,lon],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);

  marker=L.marker([lat,lon]).addTo(map)
    .bindPopup("You are here").openPopup();
}

async function fetchPlaces(lat,lon){
  const query=`
  [out:json];
  (
    node["tourism"](around:3000, ${lat}, ${lon});
    node["amenity"](around:3000, ${lat}, ${lon});
    node["leisure"](around:3000, ${lat}, ${lon});
  );
  out;`;

  const url="https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);
  const res=await fetch(url);
  const data=await res.json();

  allPlaces=data.elements.filter(p=>p.tags && p.tags.name);
  renderPlaces();
}

function renderPlaces(){
  const box=document.getElementById("places");
  box.innerHTML="";

  allPlaces
  .filter(p=>{
    if(filterType==="all") return true;
    return Object.values(p.tags).join().includes(filterType);
  })
  .slice(0,10)
  .forEach(p=>{
    const name=p.tags.name;

    box.innerHTML+=`
    <div class="place">
      <b>${name}</b>
      <span class="badge">${getType(p)}</span><br/>
      <button onclick="markVisited('${name}')">Visited</button>
      <button onclick="addBucket('${name}')">Bucket</button>
    </div>`;
  });
}

function getType(p){
  return p.tags.tourism||p.tags.amenity||p.tags.leisure||"Place";
}

function markVisited(name){
  if(!visited.includes(name)){
    visited.push(name);
    localStorage.setItem("visited",JSON.stringify(visited));
    updatePoints();
    confetti();
    renderLeaderboard();
  }
}

function updatePoints(){
  document.getElementById("points").innerText =
    "⭐ Points: "+visited.length*10;
}

function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  const box=document.getElementById("bucket");
  box.innerHTML="";
  bucket.forEach(b=>{
    box.innerHTML+=`<div class="place">${b}</div>`;
  });
}

function renderLeaderboard(){
  const box=document.getElementById("leaderboard");
  box.innerHTML = `
    <div class="place">
      You 🧍‍♂️ - ${visited.length*10} pts
    </div>`;
}

function setFilter(type){
  filterType=type;
  renderPlaces();
}

function searchPlaces(text){
  const box=document.getElementById("places");
  box.innerHTML="";

  allPlaces
  .filter(p=>p.tags.name.toLowerCase().includes(text.toLowerCase()))
  .slice(0,10)
  .forEach(p=>{
    box.innerHTML+=`<div class="place">${p.tags.name}</div>`;
  });
}

function confetti(){
  for(let i=0;i<20;i++){
    const el=document.createElement("div");
    el.className="confetti";
    el.style.left=Math.random()*100+"%";
    el.style.background=["red","yellow","blue","green"][Math.floor(Math.random()*4)];
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}
</script>

</body>
</html>
