<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif}
#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column}
#app{display:none}
input{padding:10px;border-radius:10px;border:none;margin:10px;width:90%}
button{padding:8px;border:none;border-radius:10px;background:#3b82f6;color:white;margin:5px}
#map{height:250px;margin:10px;border-radius:10px}
#places{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:#1e293b;padding:10px;border-radius:10px}
img{width:100%;height:100px;object-fit:cover;border-radius:10px}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#020617;padding:10px}
.hidden{display:none}
</style>
</head>

<body>

<div id="loginPage">
<h2>Login 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<div id="app">

<h2 style="text-align:center">Wanderer Pro</h2>

<input placeholder="Search place..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍 Location</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<h3 style="padding-left:10px;">Nearby</h3>
<div id="places"></div>

<div id="bucketScreen" class="hidden">
<h3>Bucket</h3>
<div id="bucket"></div>
</div>

<div class="nav">
<button onclick="showTab('places')">Explore</button>
<button onclick="showTab('bucketScreen')">Bucket</button>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, collection, addDoc, getDocs }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userId = "";

window.googleLogin = function(){
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider).catch(()=>alert("Login failed"));
};

onAuthStateChanged(auth, user=>{
  if(user){
    userId = user.uid;
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";
    initMap();
    loadBucket();
  }
});

window.logout = function(){
  signOut(auth).then(()=>location.reload());
};

window.saveToCloud = async function(name){
  try{
    await addDoc(collection(db,"users",userId,"bucket"),{name});
    alert("Saved ☁️");
    loadBucket();
  }catch{
    alert("Save failed");
  }
};

async function loadBucket(){
  try{
    const snap = await getDocs(collection(db,"users",userId,"bucket"));
    let html="";
    snap.forEach(doc=>{
      html += `<div class="card">${doc.data().name}</div>`;
    });
    document.getElementById("bucket").innerHTML = html || "No items";
  }catch{
    document.getElementById("bucket").innerHTML = "Error loading bucket";
  }
}
</script>

<!-- APP -->
<script>
const API_KEY = "11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;

function initMap(){
  if(map) map.remove();

  map = L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  fetchPlaces();
}

async function fetchPlaces(){
  const el = document.getElementById("places");
  el.innerHTML="Loading...";

  try{
    const res = await fetch(`https://api.geoapify.com/v2/places?categories=tourism,restaurant,cafe&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`);
    
    if(!res.ok) throw new Error("API fail");

    const data = await res.json();

    if(!data.features || data.features.length===0){
      el.innerHTML="No places found";
      return;
    }

    let html="";
    data.features.forEach(p=>{
      const name=p.properties.name||"Place";
      const lat=p.properties.lat;
      const lon=p.properties.lon;

      html+=`
      <div class="card">
        <img src="https://source.unsplash.com/400x200/?${name}">
        <b>${name}</b><br>
        <button onclick="direction(${lat},${lon})">Direction</button>
        <button onclick="saveToCloud('${name}')">Save</button>
      </div>`;
    });

    el.innerHTML=html;

  }catch(err){
    console.error(err);
    el.innerHTML="⚠️ Failed to load places";
  }
}

async function searchPlace(q){
  try{
    const res = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
    const data = await res.json();

    if(!data.features.length){
      alert("Place not found");
      return;
    }

    userLat=data.features[0].properties.lat;
    userLon=data.features[0].properties.lon;

    initMap();

  }catch{
    alert("Search error");
  }
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    initMap();
  },()=>{
    alert("Location denied");
  });
}

function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function showTab(t){
  document.getElementById("places").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}
</script>

</body>
</html>
