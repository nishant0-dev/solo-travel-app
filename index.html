<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
}

/* LOGIN SAME */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
#app{display:none}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:20px;
  font-weight:bold;
}

/* SEARCH */
input{
  padding:12px;
  border-radius:12px;
  border:none;
  margin:10px;
  width:90%;
  background:#1e293b;
  color:white;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  margin:5px;
  cursor:pointer;
  transition:0.2s;
}
button:hover{transform:scale(1.05)}

/* MAP */
#map{
  height:250px;
  margin:10px;
  border-radius:12px;
}

/* GRID */
#places{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:10px;
}

/* CARD (ZOMATO STYLE) */
.card{
  background:#1e293b;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  transition:0.3s;
}
.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.card-title{
  font-weight:bold;
  font-size:15px;
}

.card-actions{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  margin-top:8px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- LOGIN (UNCHANGED) -->
<div id="loginPage">
<h2>Login 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">Wanderer Pro</div>

<input placeholder="Search place..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍 Location</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<h3 style="padding-left:10px;">Nearby</h3>
<div id="places"></div>

<div id="bucketScreen" class="hidden">
<h3 style="padding-left:10px;">Bucket</h3>
<div id="bucket"></div>
</div>

<div class="nav">
<button onclick="showTab('places')">Explore</button>
<button onclick="showTab('bucketScreen')">Bucket</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_KEY = "11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;
let bucket = JSON.parse(localStorage.getItem("bucket"))||[];
let points = parseInt(localStorage.getItem("points"))||0;

/* MAP */
function initMap(){
  if(map) map.remove();

  map = L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  L.marker([userLat,userLon]).addTo(map);

  fetchPlaces();
}

/* FIXED FETCH */
async function fetchPlaces(){
  const el = document.getElementById("places");
  el.innerHTML="Loading... ⏳";

  try{
    const res = await fetch(`https://api.geoapify.com/v2/places?categories=tourism,restaurant,cafe,leisure&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`);

    if(!res.ok) throw new Error("API error");

    const data = await res.json();

    if(!data.features || data.features.length===0){
      el.innerHTML="No places found 😕";
      return;
    }

    let html="";

    data.features.forEach(p=>{
      const name = p.properties.name || "Place";
      const lat = p.properties.lat;
      const lon = p.properties.lon;

      html += `
      <div class="card">
        <img src="https://source.unsplash.com/400x200/?${name}">
        <div class="card-content">
          <div class="card-title">${name}</div>

          <div class="card-actions">
            <button onclick="direction(${lat},${lon})">🧭</button>
            <button onclick="addBucket('${name}')">💾</button>
            <button onclick="visit('${name}')">⭐</button>
          </div>
        </div>
      </div>`;
    });

    el.innerHTML=html;

  }catch(err){
    console.error(err);
    el.innerHTML="⚠️ Failed to load places";
  }
}

/* SEARCH FIX */
async function searchPlace(q){
  try{
    const res = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
    const data = await res.json();

    if(!data.features.length){
      alert("Place not found ❌");
      return;
    }

    userLat=data.features[0].properties.lat;
    userLon=data.features[0].properties.lon;

    initMap();

  }catch{
    alert("Search error ⚠️");
  }
}

/* LOCATION */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    initMap();
  },()=>{
    alert("Location permission denied");
  });
}

/* DIRECTION */
function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

/* BUCKET */
function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  document.getElementById("bucket").innerHTML =
    bucket.map(b=>`<div class="card"><div class="card-content">${b}</div></div>`).join("");
}

/* VISIT */
function visit(name){
  points+=10;
  localStorage.setItem("points",points);
  alert("🎉 +10 points");
}

/* TAB */
function showTab(tab){
  document.getElementById("places").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

/* LOGIN (UNCHANGED) */
function googleLogin(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initMap();
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
