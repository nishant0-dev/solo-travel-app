<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0b1220;
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:15px;
  font-size:22px;
  font-weight:bold;
  background:#0f172a;
}

/* SEARCH */
input{
  width:92%;
  margin:10px auto;
  display:block;
  padding:14px;
  border-radius:14px;
  border:none;
  background:#1e293b;
  color:white;
  font-size:15px;
}

/* BUTTON */
button{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

/* MAP */
#map{
  height:55vh;
  border-radius:20px;
  margin:10px;
}

/* 🔥 PREMIUM SHEET */
#sheet{
  position:fixed;
  bottom:0;
  width:100%;
  height:45vh;
  background:rgba(15,23,42,0.95);
  backdrop-filter:blur(20px);
  border-radius:25px 25px 0 0;
  padding:15px;
  overflow-y:auto;
  box-shadow:0 -10px 40px rgba(0,0,0,0.6);
}

/* HANDLE */
#handle{
  width:60px;
  height:6px;
  background:#475569;
  margin:8px auto;
  border-radius:10px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:16px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* IMAGE */
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

/* CONTENT */
.card-content{
  padding:10px;
}

.card-title{
  font-weight:600;
  font-size:14px;
  margin-bottom:6px;
}

/* BUTTON ROW */
.actions{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
}

.actions button{
  font-size:12px;
  padding:6px 8px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-ganges-river-in-india-1574/1080p.mp4">
</video>

<div class="login-box">
<h2>Wanderer Pro 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>
</div>

<!-- APP -->
<div id="app">
<div class="header">Wanderer Pro</div>

<input placeholder="Search..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<!-- DRAG SHEET -->
<div id="sheet">
<div id="handle"></div>
<div id="places"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_KEY="11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;

/* MAP */
function initMap(){
  if(map) map.remove();

  map=L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  fetchPlaces();
}

/* API */
async function fetchPlaces(){
  const el=document.getElementById("places");
  el.innerHTML="Loading...";

  try{
    const url=`https://api.geoapify.com/v2/places?categories=tourism.sights,catering.restaurant,catering.cafe&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`;

    const res=await fetch(url);
    const data=await res.json();

  let html = `<div class="grid">`;

data.features.forEach(p=>{
  const name = p.properties.name || "Place";
  const lat = p.properties.lat;
  const lon = p.properties.lon;

  html += `
  <div class="card">
    <img src="https://source.unsplash.com/400x300/?travel,${name}">
    <div class="card-content">
      <div class="card-title">${name}</div>

      <div class="actions">
        <button onclick="direction(${lat},${lon})">🧭</button>
        <button onclick="addBucket('${name}')">💾</button>
        <button onclick="visit('${name}')">⭐</button>
      </div>
    </div>
  </div>`;
});

html += `</div>`;
document.getElementById("places").innerHTML = html;
  }catch{
    el.innerHTML="Error loading";
  }
}

/* SEARCH */
async function searchPlace(q){
  const res=await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
  const data=await res.json();

  userLat=data.features[0].properties.lat;
  userLon=data.features[0].properties.lon;

  initMap();
}

/* LOCATION */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    initMap();
  });
}

/* DIRECTION */
function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

/* 🔥 DRAG SYSTEM */
const sheet=document.getElementById("sheet");
let startY=0;
let currentY=0;
let isDragging=false;

sheet.addEventListener("mousedown",startDrag);
sheet.addEventListener("touchstart",startDrag);

function startDrag(e){
  isDragging=true;
  startY=e.touches?e.touches[0].clientY:e.clientY;
}

document.addEventListener("mousemove",drag);
document.addEventListener("touchmove",drag);

function drag(e){
  if(!isDragging) return;
  currentY=e.touches?e.touches[0].clientY:e.clientY;
  let diff=startY-currentY;

  if(diff>50){
    sheet.style.height="80vh";
  }else if(diff<-50){
    sheet.style.height="40vh";
  }
}

document.addEventListener("mouseup",()=>isDragging=false);
document.addEventListener("touchend",()=>isDragging=false);

/* LOGIN SAME */
function googleLogin(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initMap();
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
