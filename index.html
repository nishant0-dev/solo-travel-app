<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:white;
  overflow:hidden;
}

/* HEADER */
.header{
  text-align:center;
  padding:12px;
  font-size:20px;
}

/* PROFILE BUTTON */
#profileBtn{
  position:absolute;
  left:15px;
  top:15px;
  cursor:pointer;
  z-index:1100;
}

/* OVERLAY */
#overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  opacity:0;
  pointer-events:none;
  transition:0.3s;
  z-index:999;
}
#overlay.open{
  opacity:1;
  pointer-events:auto;
}

/* MENU */
#menu{
  position:fixed;
  left:-260px;
  top:0;
  width:250px;
  height:100%;
  background:#020617;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}
#menu.open{
  left:0;
}

/* MAP */
#map{
  height:45vh;
}

/* SHEET */
#sheet{
  position:fixed;
  bottom:0;
  width:100%;
  height:50vh;
  background:#020617;
  border-radius:20px 20px 0 0;
  overflow:auto;
  padding:10px;
}

/* LOGIN */
#loginPage{
  position:relative;
  height:100vh;
}

#loginPage video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:1;
  pointer-events:none;
}

#loginPage div{
  position:relative;
  z-index:2;
}
</style>
</head>

<body>

<button id="installBtn" onclick="installApp()" style="display:none">Install</button>

<!-- LOGIN -->
<div id="loginPage">
<video autoplay muted loop playsinline id="bgVideo">
  <source src="video.mp4" type="video/mp4">
</video>

<div style="text-align:center;">
<h2>Wanderer Pro 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<div id="profileBtn" onclick="toggleMenu()">☰</div>
<div class="header">Wanderer Pro</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="menu">
  <h3 id="menuUser">User</h3>
  <p id="menuEmail"></p>
  <button onclick="logout()">Logout</button>
</div>

<div id="userBar">
  <div id="userName">User</div>
</div>

<input id="searchInput" placeholder="Search..." oninput="suggestPlaces(this.value)">
<div id="suggestions"></div>

<div id="map"></div>

<div id="sheet">
<div id="handle"></div>
<div id="places"></div>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_KEY="11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;

function initMap(){
  map=L.map('map').setView([userLat,userLon],13);
  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`).addTo(map);
}

/* MENU */
function toggleMenu(){
  document.getElementById("menu").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("open");
}

/* SEARCH */
async function suggestPlaces(q){
  if(q.length<2) return;

  const res=await fetch(`https://api.geoapify.com/v1/geocode/autocomplete?text=${q}&apiKey=${API_KEY}`);
  const data=await res.json();

  let html="";
  data.features.forEach(p=>{
    html+=`<div onclick="selectPlace(${p.properties.lat},${p.properties.lon})">${p.properties.formatted}</div>`;
  });

  document.getElementById("suggestions").innerHTML=html;
}

function selectPlace(lat,lon){
  userLat=lat;
  userLon=lon;
  initMap();
}

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  document.getElementById("installBtn").style.display="block";
});

function installApp(){
  deferredPrompt.prompt();
}
</script>

<!-- FIREBASE (UNCHANGED) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlu9Xw8_Nb9sN-TCyMsjORViHQD9MQnRg",
  authDomain: "wanderer-6b780.firebaseapp.com",
  projectId: "wanderer-6b780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.googleLogin = async function(){
  await signInWithPopup(auth, provider);
};

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("userName").innerText=user.displayName;
    document.getElementById("menuUser").innerText=user.displayName;
    document.getElementById("menuEmail").innerText=user.email;

    initMap();
  }
});

window.logout=function(){
  signOut(auth).then(()=>location.reload());
};
</script>

</body>
</html>
