<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solo Travel App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      margin-top: 100px;
    }

    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      width: 80%;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #00c6ff;
      color: black;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #00aaff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>🌍 Solo Travel App</h1>
    <p>Find nearby places & explore</p>

    <div class="card">
      <h2>📍 Nearby Place</h2>
      <p id="location">Detecting location...</p>
      <button onclick="getLocation()">Get My Location</button>
    </div>
  </div>

 <script>
    <div id="places"></div>
async function getLocation() {
  if (!navigator.geolocation) {
    document.getElementById("location").innerText = "Geolocation not supported";
    return;
  }
  navigator.geolocation.getCurrentPosition(showPosition, () => {
    document.getElementById("location").innerText = "Permission denied";
  });
}

async function showPosition(position) {
  const lat = position.coords.latitude;
  const lon = position.coords.longitude;

  document.getElementById("location").innerText =
    "📍 Your Location: " + lat.toFixed(4) + ", " + lon.toFixed(4);

  fetchNearbyPlaces(lat, lon);
}

async function fetchNearbyPlaces(lat, lon) {
  const query = `
  [out:json];
  (
    node["tourism"](around:2000, ${lat}, ${lon});
    node["amenity"="restaurant"](around:2000, ${lat}, ${lon});
    node["amenity"="cafe"](around:2000, ${lat}, ${lon});
    node["leisure"="park"](around:2000, ${lat}, ${lon});
  );
  out;
  `;

  const url = "https://overpass-api.de/api/interpreter?data=" + encodeURIComponent(query);

  try {
    const res = await fetch(url);
    const data = await res.json();

    let output = "<h3>🌍 Nearby Places</h3>";

    if (!data.elements.length) {
      output += "<p>No places found nearby</p>";
    } else {
      data.elements.slice(0, 10).forEach(place => {
        const name = place.tags.name || "Unknown Place";
        const dist = getDistance(lat, lon, place.lat, place.lon);

        output += `
          <div style="background:rgba(255,255,255,0.1);padding:10px;margin:10px;border-radius:8px;">
            <b>${name}</b><br/>
            📍 ${dist.toFixed(2)} km away
          </div>
        `;
      });
    }

    document.getElementById("places").innerHTML = output;

  } catch (e) {
    document.getElementById("places").innerText = "Error loading places";
  }
}

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;

  const a =
    Math.sin(dLat/2) * Math.sin(dLat/2) +
    Math.cos(lat1 * Math.PI/180) *
    Math.cos(lat2 * Math.PI/180) *
    Math.sin(dLon/2) * Math.sin(dLon/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}
</script>
 
  

</body>
</html>
