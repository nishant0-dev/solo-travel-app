<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#0f172a;
  color:white;
}

/* LOGIN */
#loginPage {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* APP */
#app { display:none; }

.header { text-align:center; padding:15px; }

.search input {
  width:90%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  background:#3b82f6;
  color:white;
  border:none;
  padding:8px;
  border-radius:10px;
  margin:5px;
}

#map {
  height:250px;
  margin:10px;
  border-radius:10px;
}

#places {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  padding:10px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login 🌍</h2>
  <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">Wanderer Pro</div>

<div class="search">
  <input placeholder="Search..."
  onkeypress="if(event.key==='Enter') searchGlobal(this.value)">
</div>

<div style="text-align:center">
  <button onclick="getLocation()">📍 Location</button>
  <button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<div id="explore">
  <h3>Nearby</h3>
  <div id="places"></div>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ✅ FIREBASE (CORRECT WAY) -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDlu9Xw8_Nb9sN-TCyMsjORViHQD9MQnRg",
  authDomain: "wanderer-6b780.firebaseapp.com",
  projectId: "wanderer-6b780"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* LOGIN */
window.googleLogin = function(){
  const provider = new GoogleAuthProvider();

  signInWithPopup(auth, provider)
    .then(() => showApp())
    .catch(() => alert("Login failed"));
};

/* AUTO LOGIN */
onAuthStateChanged(auth, user => {
  if(user) showApp();
});

/* LOGOUT */
window.logout = function(){
  signOut(auth).then(()=>location.reload());
};
</script>

<!-- APP LOGIC -->
<script>
let map;
let userLat = 28.6139;
let userLon = 77.2090;

function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initApp();
}

function initApp(){
  initMap(userLat,userLon);
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    initMap(userLat,userLon);
    fetchPlaces(userLat,userLon);
  });
}

function initMap(lat,lon){
  if(map) map.remove();
  map = L.map('map').setView([lat,lon],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

async function searchGlobal(q){
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`);
  const data = await res.json();

  if(!data.length) return alert("Not found");

  userLat = parseFloat(data[0].lat);
  userLon = parseFloat(data[0].lon);

  initMap(userLat,userLon);
  fetchPlaces(userLat,userLon);
}

async function fetchPlaces(lat,lon){
  document.getElementById("places").innerHTML="Loading...";

  try{
    const query=`[out:json];node["amenity"](around:2000,${lat},${lon});out;`;
    const res=await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query));
    const data=await res.json();

    let html="";
    data.elements.slice(0,6).forEach(p=>{
      html+=`<div class="card">${p.tags?.name||"Place"}</div>`;
    });

    document.getElementById("places").innerHTML=html;

  }catch{
    document.getElementById("places").innerHTML="Error";
  }
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
    initMap(userLat,userLon);
    fetchPlaces(userLat,userLon);
  });
}
</script>

</body>
</html>
