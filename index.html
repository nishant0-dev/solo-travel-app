<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solo Travel Pro</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
  color:white;
  text-align:center;
}

.container { margin-top:50px; }

.card {
  background: rgba(255,255,255,0.1);
  padding:20px;
  margin:20px auto;
  border-radius:15px;
  width:90%;
  max-width:420px;
  backdrop-filter: blur(10px);
}

button {
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  cursor:pointer;
}

input {
  padding:10px;
  border-radius:8px;
  border:none;
  width:80%;
  margin:10px;
}

.place {
  background: rgba(255,255,255,0.1);
  margin:10px auto;
  padding:12px;
  border-radius:10px;
  width:90%;
  max-width:420px;
  text-align:left;
}
</style>
</head>

<body>

<div class="container">
  <h1>🌍 Solo Travel Pro</h1>
  <p id="points">⭐ Points: 0</p>

  <div class="card">
    <h3>📍 Location</h3>
    <p id="location">Click to detect</p>
    <button onclick="getLocation()">Get Location</button>
  </div>

  <input type="text" placeholder="Search..." oninput="filterPlaces(this.value)">

  <div>
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('temple')">Temple</button>
    <button onclick="setFilter('restaurant')">Food</button>
    <button onclick="setFilter('park')">Nature</button>
  </div>

  <h3>🌍 Nearby</h3>
  <div id="places"></div>

  <h3>🎯 Bucket List</h3>
  <div id="bucket"></div>
</div>

<script>
let allPlaces = [];
let filterType = "all";

let visited = JSON.parse(localStorage.getItem("visited")) || [];
let bucket = JSON.parse(localStorage.getItem("bucket")) || [];

updatePoints();

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    document.getElementById("location").innerText =
      lat.toFixed(4)+", "+lon.toFixed(4);

    fetchPlaces(lat,lon);
  });
}

async function fetchPlaces(lat,lon){
  const query = `
  [out:json];
  (
    node["tourism"](around:3000, ${lat}, ${lon});
    node["amenity"](around:3000, ${lat}, ${lon});
    node["leisure"](around:3000, ${lat}, ${lon});
  );
  out;
  `;

  const url = "https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query);

  const res = await fetch(url);
  const data = await res.json();

  allPlaces = data.elements.filter(p=>p.tags && p.tags.name);
  renderPlaces();
}

function renderPlaces(){
  const box = document.getElementById("places");
  box.innerHTML="";

  allPlaces
  .filter(p=>{
    if(filterType==="all") return true;
    return Object.values(p.tags).join().includes(filterType);
  })
  .forEach(p=>{
    const name = p.tags.name;

    box.innerHTML += `
    <div class="place">
      <b>${name}</b><br/>
      <button onclick="markVisited('${name}')">Visited</button>
      <button onclick="addBucket('${name}')">Bucket</button>
    </div>`;
  });

  renderBucket();
}

function markVisited(name){
  if(!visited.includes(name)){
    visited.push(name);
    localStorage.setItem("visited",JSON.stringify(visited));
    updatePoints();
  }
}

function updatePoints(){
  document.getElementById("points").innerText =
    "⭐ Points: "+visited.length*10;
}

function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  const box = document.getElementById("bucket");
  box.innerHTML="";

  bucket.forEach(b=>{
    box.innerHTML += `<div class="place">${b}</div>`;
  });
}

function setFilter(type){
  filterType=type;
  renderPlaces();
}

function filterPlaces(text){
  const box = document.getElementById("places");
  box.innerHTML="";

  allPlaces
  .filter(p=>p.tags.name.toLowerCase().includes(text.toLowerCase()))
  .forEach(p=>{
    const name = p.tags.name;
    box.innerHTML += `<div class="place">${name}</div>`;
  });
}
</script>

</body>
</html>
