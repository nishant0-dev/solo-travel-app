<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
<style>
body{
 <style>

  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  overflow-x:hidden;
}

/* LOGIN SAME */
#loginPage{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
#app{display:none}

/* HEADER */
.header{
  text-align:center;
  padding:12px;
  font-size:20px;
  font-weight:bold;
}

/* SEARCH */
input{
  padding:12px;
  border-radius:12px;
  border:none;
  margin:10px;
  width:90%;
  background:#1e293b;
  color:white;
}

/* BUTTON */
button{
  padding:8px 12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
  margin:5px;
  cursor:pointer;
}

/* MAP */
#map{
  height:40vh;
  border-radius:12px;
  margin:10px;
}

/* 🔥 BOTTOM SHEET */
#places{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:50vh;
  background:#020617;
  border-radius:20px 20px 0 0;
  overflow-y:auto;
  padding:10px;
  box-shadow:0 -5px 20px rgba(0,0,0,0.5);
  animation:slideUp 0.4s ease;
}

/* DRAG HANDLE */
#places::before{
  content:"";
  width:50px;
  height:5px;
  background:gray;
  display:block;
  margin:5px auto 10px;
  border-radius:10px;
}

/* CARD */
.card{
  background:#1e293b;
  border-radius:14px;
  margin-bottom:12px;
  overflow:hidden;
  display:flex;
  animation:fadeIn 0.5s ease;
}

.card img{
  width:120px;
  height:100px;
  object-fit:cover;
}

.card-content{
  padding:10px;
  flex:1;
}

.card-title{
  font-weight:bold;
}

/* ACTIONS */
.card-actions{
  margin-top:5px;
}

/* NAV */
.nav{
  display:none; /* hidden now (we use bottom sheet) */
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(10px)}
  to{opacity:1; transform:translateY(0)}
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
</style>
<!-- LOGIN (UNCHANGED) -->
<div id="loginPage">
<h2>Login 🌍</h2>
<button onclick="googleLogin()">Login with Google</button>
</div>

<div id="app">

<div class="header">Wanderer Pro</div>

<input placeholder="Search place..."
onkeypress="if(event.key==='Enter') searchPlace(this.value)">

<div style="text-align:center">
<button onclick="getLocation()">📍 Location</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>

<h3 style="padding-left:10px;">Nearby</h3>
<div id="places"></div>

<div id="bucketScreen" class="hidden">
<h3 style="padding-left:10px;">Bucket</h3>
<div id="bucket"></div>
</div>

<div class="nav">
<button onclick="showTab('places')">Explore</button>
<button onclick="showTab('bucketScreen')">Bucket</button>
</div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const API_KEY = "11246f50749e4f76b6d69ff9bb749313";

let map;
let userLat=28.61,userLon=77.20;
let bucket = JSON.parse(localStorage.getItem("bucket"))||[];
let points = parseInt(localStorage.getItem("points"))||0;

/* MAP */
function initMap(){
  if(map) map.remove();

  map = L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`)
  .addTo(map);

  L.marker([userLat,userLon]).addTo(map);

  fetchPlaces();
}

/* FIXED API */
async function fetchPlaces(){
  const el = document.getElementById("places");
  el.innerHTML="Loading...";

  try{
    const url = `https://api.geoapify.com/v2/places?categories=tourism.sights,catering.restaurant,catering.cafe,entertainment&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();

    if(!data.features || data.features.length===0){
      el.innerHTML="No places found 😕";
      return;
    }

    let html="";

    data.features.forEach(p=>{
      const name = p.properties.name || "Place";
      const lat = p.properties.lat;
      const lon = p.properties.lon;

      html += `
      <div class="card">
        <img src="https://picsum.photos/400/200?random=${Math.random()}">
        <div class="card-content">
          <div class="card-title">${name}</div>
          <button onclick="direction(${lat},${lon})">🧭</button>
          <button onclick="addBucket('${name}')">💾</button>
          <button onclick="visit('${name}')">⭐</button>
        </div>
      </div>`;
    });

    el.innerHTML=html;

  }catch(err){
    console.error(err);
    el.innerHTML="❌ Failed to load places";
  }
}

/* SEARCH */
async function searchPlace(q){
  try{
    const res = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
    const data = await res.json();

    if(!data.features.length){
      alert("Place not found");
      return;
    }

    userLat=data.features[0].properties.lat;
    userLon=data.features[0].properties.lon;

    initMap();

  }catch{
    alert("Search error");
  }
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    initMap();
  });
}

function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  document.getElementById("bucket").innerHTML =
    bucket.map(b=>`<div class="card">${b}</div>`).join("");
}

function visit(name){
  points+=10;
  localStorage.setItem("points",points);
  alert("🎉 +10 points");
}

function showTab(tab){
  document.getElementById("places").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById(tab).classList.remove("hidden");
}

/* LOGIN SAME */
function googleLogin(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initMap();
}

function logout(){
  location.reload();
}
</script>

</body>
</html>
