<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

/* HEADER */
.header {
  padding: 18px;
  font-size: 22px;
  font-weight: bold;
  text-align: center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}

/* SEARCH */
.search input {
  width: 92%;
  margin: 12px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #1e293b;
  color: white;
  font-size: 14px;
}

/* BUTTON */
button {
  background: linear-gradient(45deg, #3b82f6, #06b6d4);
  color: white;
  border: none;
  padding: 8px 12px;
  border-radius: 12px;
  margin: 5px;
  cursor: pointer;
  font-size: 12px;
}

/* MAP */
#map {
  height: 260px;
  margin: 12px;
  border-radius: 16px;
  overflow: hidden;
}

/* CARD GRID */
#places {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.05);
  padding: 10px;
  border-radius: 16px;
  backdrop-filter: blur(8px);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

/* IMAGE */
.card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

/* NAVBAR */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #020617;
  display: flex;
  justify-content: space-around;
  padding: 12px;
}

.hidden { display: none; }
  </style>
</head>

<body>

<div class="header">🌍 Wanderer Pro</div>

<div class="search">
  <input placeholder="Search place..."
  onkeypress="if(event.key==='Enter') searchGlobal(this.value)">
</div>

<div style="text-align:center">
  <button onclick="getLocation()">📍 Get My Location</button>
</div>

<div id="map"></div>

<!-- EXPLORE -->
<div id="explore">
  <h3 style="padding-left:10px;">Nearby Places</h3>
  <div id="places"></div>
</div>

<!-- BUCKET -->
<div id="bucketScreen" class="hidden">
  <h3 style="padding-left:10px;">Bucket List</h3>
  <div id="bucket"></div>
</div>

<!-- TASK -->
<div id="taskScreen" class="hidden">
  <h3 style="padding-left:10px;">Tasks</h3>
  <div id="tasks"></div>
  <h4 style="padding-left:10px;">⭐ Points: <span id="points">0</span></h4>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('explore')">Explore</button>
  <button onclick="showTab('bucketScreen')">Bucket</button>
  <button onclick="showTab('taskScreen')">Tasks</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let userLat = 28.6139;
let userLon = 77.2090;

let bucket = JSON.parse(localStorage.getItem("bucket")) || [];
let points = parseInt(localStorage.getItem("points")) || 0;

updatePoints();
renderBucket();
renderTasks();

/* AUTO LOAD */
window.onload = () => {
  initMap(userLat, userLon);

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      initMap(userLat, userLon);
      fetchPlaces(userLat, userLon);
    },()=>{
      fetchPlaces(userLat, userLon);
    });
  }
};

/* LOCATION */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    initMap(userLat, userLon);
    fetchPlaces(userLat, userLon);
  });
}

/* MAP */
function initMap(lat, lon){
  if(map) map.remove();

  map = L.map('map').setView([lat, lon], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([lat, lon]).addTo(map).bindPopup("You").openPopup();
}

/* SEARCH */
async function searchGlobal(query){
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
  const data = await res.json();

  if(!data.length) return alert("Not found");

  userLat = parseFloat(data[0].lat);
  userLon = parseFloat(data[0].lon);

  initMap(userLat, userLon);
  fetchPlaces(userLat, userLon);
}

/* DISTANCE */
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI/180;
  const dLon = (lon2 - lon1) * Math.PI/180;

  const a =
    Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180) *
    Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)*Math.sin(dLon/2);

  return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(2);
}

/* FETCH */
async function fetchPlaces(lat, lon){
  document.getElementById("places").innerHTML = "Loading... ⏳";

  const query = `
  [out:json];
  node["amenity"](around:2000, ${lat}, ${lon});
  out;`;

  const res = await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query));
  const data = await res.json();

  if(!data.elements.length){
    document.getElementById("places").innerHTML =
      "<div class='card'>No places found 😕</div>";
    return;
  }

  let html = "";

  data.elements.slice(0,8).forEach(p=>{
    const name = p.tags?.name || "Place";
    const distance = getDistance(userLat, userLon, p.lat, p.lon);

    html += `
    <div class="card">
      <img src="https://source.unsplash.com/400x200/?travel,${name}">
      <b>${name}</b><br>
      <small>📍 ${distance} km away</small><br><br>
      <button onclick="focusMap(${p.lat},${p.lon})">View</button>
      <button onclick="addBucket('${name}')">Save</button>
    </div>`;
  });

  document.getElementById("places").innerHTML = html;
}

/* MAP FOCUS */
function focusMap(lat, lon){
  map.setView([lat, lon], 15);
  L.marker([lat, lon]).addTo(map);
}

/* BUCKET */
function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket", JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  let html = "";

  bucket.forEach((b,i)=>{
    html += `
      <div class="card">
        ${b}
        <button onclick="removeBucket(${i})">❌</button>
      </div>`;
  });

  document.getElementById("bucket").innerHTML = html;
}

function removeBucket(i){
  bucket.splice(i,1);
  localStorage.setItem("bucket", JSON.stringify(bucket));
  renderBucket();
}

/* TASK */
function renderTasks(){
  document.getElementById("tasks").innerHTML = `
    <div class="card">
      Explore places & earn points
      <button onclick="completeTask()">Complete</button>
    </div>`;
}

function completeTask(){
  points += 10;
  localStorage.setItem("points", points);
  updatePoints();
  alert("+10 Points 🎉");
}

function updatePoints(){
  document.getElementById("points").innerText = points;
}

/* TAB */
function showTab(tab){
  document.getElementById("explore").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}
</script>

</body>
</html>
