<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#0f2027;
  color:white;
  overflow-x:hidden;
}

.screen{
  width:100%;
  height:100vh;
  position:absolute;
  top:0;
  left:0;
  transition:0.5s;
  padding:20px;
}

#home{ background:#0f2027; }
#placesScreen{ background:#203a43; left:100%; }

button{
  padding:10px;
  margin:5px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
}

.place{
  background:rgba(255,255,255,0.1);
  margin:10px;
  padding:10px;
  border-radius:10px;
}

#map{ height:250px; margin:10px 0; }
</style>
</head>

<body>

<!-- HOME SCREEN -->
<div id="home" class="screen">
  <h2>🌍 Wanderer</h2>

  <button onclick="getLocation()">Get Location</button>

  <input placeholder="Search world..."
  onkeypress="if(event.key==='Enter') searchGlobal(this.value)">

  <button onclick="openPlaces()">Explore Nearby →</button>

  <div id="map"></div>
</div>

<!-- PLACES SCREEN -->
<div id="placesScreen" class="screen">
  <button onclick="backHome()">⬅ Back</button>

  <h3>📍 Nearby Places</h3>
  <div id="places"></div>

  <h3>🎯 Bucket List</h3>
  <div id="bucket"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let bucket = JSON.parse(localStorage.getItem("bucket")) || [];

function openPlaces(){
  document.getElementById("home").style.left="-100%";
  document.getElementById("placesScreen").style.left="0";
}

function backHome(){
  document.getElementById("home").style.left="0";
  document.getElementById("placesScreen").style.left="100%";
}

function initMap(lat,lon){
  if(map) map.remove();

  map=L.map('map').setView([lat,lon],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
  .addTo(map);

  L.marker([lat,lon]).addTo(map);
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    initMap(lat,lon);
    fetchPlaces(lat,lon);
  });
}

async function searchGlobal(query){
  const url=`https://nominatim.openstreetmap.org/search?format=json&q=${query}`;
  const res=await fetch(url);
  const data=await res.json();

  if(!data.length) return;

  const lat=parseFloat(data[0].lat);
  const lon=parseFloat(data[0].lon);

  initMap(lat,lon);
  fetchPlaces(lat,lon);
}

async function fetchPlaces(lat,lon){
  const query=`
  [out:json];
  node["amenity"](around:2000, ${lat}, ${lon});
  out;`;

  const res=await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query));
  const data=await res.json();

  let html="";
  data.elements.slice(0,10).forEach(p=>{
    const name=p.tags?.name || "Place";

    html+=`
    <div class="place">
      ${name}
      <button onclick="addBucket('${name}')">Add</button>
    </div>`;
  });

  document.getElementById("places").innerHTML=html;
  renderBucket();
}

function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  let html="";
  bucket.forEach(b=>{
    html+=`<div class="place">${b}</div>`;
  });
  document.getElementById("bucket").innerHTML=html;
}
</script>

</body>
</html>
