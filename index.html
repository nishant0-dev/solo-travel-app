<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif}
#loginPage{height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column}
#app{display:none}
input{padding:10px;border-radius:10px;border:none;margin:10px;width:90%}
button{padding:8px;border:none;border-radius:10px;background:#3b82f6;color:white;margin:5px}
#map{height:250px;margin:10px;border-radius:10px}
#places{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:#1e293b;padding:10px;border-radius:10px}
img{width:100%;height:100px;object-fit:cover;border-radius:10px}
.nav{position:fixed;bottom:0;width:100%;display:flex;justify-content:space-around;background:#020617;padding:10px}
.hidden{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
  <h2>Login 🌍</h2>
  <button onclick="googleLogin()">Login with Google</button>
</div>

<!-- APP -->
<div id="app">

<h2 style="text-align:center">Wanderer Pro</h2>

<input id="searchInput" placeholder="Search place...">

<div style="text-align:center">
<button onclick="getLocation()">📍 Location</button>
<button onclick="logout()">Logout</button>
</div>

<div id="map"></div>
<div id="places"></div>

<div id="bucketScreen" class="hidden">
<h3>Bucket</h3>
<div id="bucket"></div>
</div>

<div id="taskScreen" class="hidden">
<h3>Tasks</h3>
Points: <span id="points">0</span>
</div>

<div class="nav">
<button onclick="showTab('places')">Explore</button>
<button onclick="showTab('bucketScreen')">Bucket</button>
<button onclick="showTab('taskScreen')">Tasks</button>
</div>

</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "YOUR_FIREBASE_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.googleLogin = function(){
  const provider = new GoogleAuthProvider();
  signInWithPopup(auth, provider)
    .then(()=>showApp())
    .catch(()=>alert("Login failed"));
};

onAuthStateChanged(auth,user=>{
  if(user) showApp();
});

window.logout = function(){
  signOut(auth).then(()=>location.reload());
};
</script>

<!-- APP LOGIC -->
<script>
const API_KEY = "11246f50749e4f76b6d69ff9bb749313";

let map, userLat=28.61, userLon=77.20;
let bucket = JSON.parse(localStorage.getItem("bucket")||"[]");
let points = parseInt(localStorage.getItem("points")||"0");

/* INIT */
function showApp(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("app").style.display="block";
  initMap();
  fetchPlaces();
  renderBucket();
  updatePoints();
}

/* MAP */
function initMap(){
  if(map) map.remove();
  map = L.map('map').setView([userLat,userLon],13);

  L.tileLayer(`https://maps.geoapify.com/v1/tile/osm-bright/{z}/{x}/{y}.png?apiKey=${API_KEY}`).addTo(map);

  L.marker([userLat,userLon]).addTo(map);
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("keypress", async(e)=>{
  if(e.key==="Enter"){
    const q=e.target.value;

    const res = await fetch(`https://api.geoapify.com/v1/geocode/search?text=${q}&apiKey=${API_KEY}`);
    const data = await res.json();

    userLat=data.features[0].properties.lat;
    userLon=data.features[0].properties.lon;

    initMap();
    fetchPlaces();
  }
});

/* FETCH */
async function fetchPlaces(){
  document.getElementById("places").innerHTML="Loading...";

  const url=`https://api.geoapify.com/v2/places?categories=tourism,restaurant,cafe&filter=circle:${userLon},${userLat},3000&limit=10&apiKey=${API_KEY}`;

  const res=await fetch(url);
  const data=await res.json();

  let html="";
  data.features.forEach(p=>{
    const name=p.properties.name||"Place";
    const lat=p.properties.lat;
    const lon=p.properties.lon;

    html+=`
    <div class="card">
      <img src="https://source.unsplash.com/400x200/?${name}">
      <b>${name}</b><br>
      <button onclick="direction(${lat},${lon})">Direction</button>
      <button onclick="addBucket('${name}')">Save</button>
      <button onclick="visit()">Visit</button>
    </div>`;
  });

  document.getElementById("places").innerHTML=html;
}

/* FUNCTIONS */
function direction(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    userLat=pos.coords.latitude;
    userLon=pos.coords.longitude;
    initMap();
    fetchPlaces();
  });
}

function addBucket(n){
  if(!bucket.includes(n)){
    bucket.push(n);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  document.getElementById("bucket").innerHTML =
    bucket.map(b=>`<div class="card">${b}</div>`).join("");
}

function visit(){
  points+=10;
  localStorage.setItem("points",points);
  updatePoints();
  alert("🎉 +10 points");
}

function updatePoints(){
  document.getElementById("points").innerText=points;
}

function showTab(t){
  document.getElementById("places").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");
  document.getElementById(t).classList.remove("hidden");
}
</script>

</body>
</html>
