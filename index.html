<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderer Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(#0f2027,#203a43,#2c5364);
  color:white;
}

.header{ padding:12px; }
.logo{ font-weight:bold; font-size:18px; }

.search{ margin:10px; }
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
  background:#00c6ff;
}

#map{
  height:250px;
  margin:10px;
  border-radius:10px;
}

.card{
  background:rgba(255,255,255,0.1);
  margin:10px;
  padding:12px;
  border-radius:10px;
}

.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#0b1a22;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.hidden{ display:none; }
</style>
</head>

<body>

<div class="header">
  <div class="logo">🌍 Wanderer</div>
</div>

<div class="search">
  <input placeholder="Search anywhere..."
  onkeypress="if(event.key==='Enter') searchGlobal(this.value)">
</div>

<div style="text-align:center">
  <button onclick="getLocation()">📍 Get My Location</button>
</div>

<div id="map"></div>

<!-- EXPLORE -->
<div id="explore">
  <h3 style="padding-left:10px;">Nearby Places</h3>
  <div id="places"></div>
</div>

<!-- BUCKET -->
<div id="bucketScreen" class="hidden">
  <h3 style="padding-left:10px;">Bucket List</h3>
  <div id="bucket"></div>
</div>

<!-- TASK -->
<div id="taskScreen" class="hidden">
  <h3 style="padding-left:10px;">Tasks</h3>
  <div id="tasks"></div>
  <h4 style="padding-left:10px;">⭐ Points: <span id="points">0</span></h4>
</div>

<!-- NAV -->
<div class="nav">
  <button onclick="showTab('explore')">Explore</button>
  <button onclick="showTab('bucketScreen')">Bucket</button>
  <button onclick="showTab('taskScreen')">Tasks</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map;
let bucket = JSON.parse(localStorage.getItem("bucket")) || [];
let points = parseInt(localStorage.getItem("points")) || 0;

updatePoints();
renderBucket();
renderTasks();

/* AUTO LOAD (MAIN FIX) */
window.onload = () => {
  initMap(28.6139,77.2090); // default Delhi

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;

      initMap(lat,lon);
      fetchPlaces(lat,lon);
    },()=>{
      fetchPlaces(28.6139,77.2090);
    });
  }
};

/* LOCATION BUTTON */
function getLocation(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    initMap(lat,lon);
    fetchPlaces(lat,lon);
  },()=>{
    alert("Permission denied ❌");
  });
}

/* MAP FIX */
function initMap(lat,lon){
  try{ if(map) map.remove(); }catch(e){}

  map = L.map('map').setView([lat,lon],13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  L.marker([lat,lon]).addTo(map).bindPopup("You").openPopup();
}

/* GLOBAL SEARCH */
async function searchGlobal(query){
  const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
  const data = await res.json();

  if(!data.length) return alert("Not found");

  const lat = parseFloat(data[0].lat);
  const lon = parseFloat(data[0].lon);

  initMap(lat,lon);
  fetchPlaces(lat,lon);
}

/* FETCH PLACES */
async function fetchPlaces(lat,lon){
  const query = `
  [out:json];
  node["amenity"](around:2000, ${lat}, ${lon});
  out;`;

  const res = await fetch("https://overpass-api.de/api/interpreter?data="+encodeURIComponent(query));
  const data = await res.json();

  if(!data.elements.length){
    document.getElementById("places").innerHTML =
      "<div class='card'>No places found</div>";
    return;
  }

  let html = "";

  data.elements.slice(0,8).forEach(p=>{
    const name = p.tags?.name || "Place";

    html += `
    <div class="card">
      <b>${name}</b><br>
      <small>${p.lat.toFixed(3)}, ${p.lon.toFixed(3)}</small><br>
      <button onclick="focusMap(${p.lat},${p.lon})">View</button>
      <button onclick="addBucket('${name}')">Save</button>
      <button onclick="showDetails('${name}')">Info</button>
    </div>`;
  });

  document.getElementById("places").innerHTML = html;
}

/* DETAILS */
function showDetails(name){
  alert(name + " is a famous place to explore 🌍");
}

/* MAP FOCUS */
function focusMap(lat,lon){
  map.setView([lat,lon],15);
  L.marker([lat,lon]).addTo(map);
}

/* BUCKET */
function addBucket(name){
  if(!bucket.includes(name)){
    bucket.push(name);
    localStorage.setItem("bucket",JSON.stringify(bucket));
    renderBucket();
  }
}

function renderBucket(){
  let html="";
  bucket.forEach(b=>{
    html += `<div class="card">${b}</div>`;
  });
  document.getElementById("bucket").innerHTML = html;
}

/* TASK */
function renderTasks(){
  document.getElementById("tasks").innerHTML = `
    <div class="card">
      Visit 3 places
      <button onclick="completeTask()">Complete</button>
    </div>`;
}

function completeTask(){
  points += 10;
  localStorage.setItem("points",points);
  updatePoints();
  alert("🎉 +10 points");
}

function updatePoints(){
  document.getElementById("points").innerText = points;
}

/* TAB SWITCH */
function showTab(tab){
  document.getElementById("explore").classList.add("hidden");
  document.getElementById("bucketScreen").classList.add("hidden");
  document.getElementById("taskScreen").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");
}
</script>

</body>
</html>
